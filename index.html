<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Adventure Game</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="background-container">
            <img class="background-image" src="/media/cartoon-space-background-q0svwt1fa3jh8t00.jpg" alt="stars in the background">
            
            <p id="background-citation"><a href="https://wallpapers.com/background/cartoon-space-background-q0svwt1fa3jh8t00.html">Background by stephen137</a> on Wallpapers.com</p>
        </div>
        <div class="background-container" id="background-border">
            <img class="background-image" src="/media/vecteezy_creative-streaming-overlay-design-for-online-gamers-with_24976183.png" alt="">
        </div>
        <div id="saturn-container"></div>
        <div id="game-container">
            <h1>Saturn Road Trip</h1>
            <div id="question-container">
                <p id="question">Your adventure begins now...</p>
            </div>
            <ul id="answers">
                <button class="next-btn" onclick="nextQuestion(0)">Start 0</button>
                <button class="next-btn" onclick="nextQuestion(1)">Start 1</button>
                <button class="next-btn" onclick="nextQuestion(2)">Start 2</button>
                <!-- Answer buttons will be injected here by JavaScript -->
            </ul>

        </div>
        <script src="script.js"></script>
    </body>
</html>
